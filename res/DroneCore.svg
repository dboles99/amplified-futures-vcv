<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="45" height="380" viewBox="0 0 45 380">
  <!-- Background: dark charcoal -->
  <rect width="45" height="380" fill="#1c1c1c"/>
  <!-- Rack screw holes -->
  <circle cx="7.5" cy="7.5" r="3.5" fill="#111" stroke="#444" stroke-width="0.75"/>
  <circle cx="37.5" cy="7.5" r="3.5" fill="#111" stroke="#444" stroke-width="0.75"/>
  <circle cx="7.5" cy="372.5" r="3.5" fill="#111" stroke="#444" stroke-width="0.75"/>
  <circle cx="37.5" cy="372.5" r="3.5" fill="#111" stroke="#444" stroke-width="0.75"/>
  <!-- Module name -->
  <text x="22.5" y="22" font-size="5.5" fill="#8888aa" text-anchor="middle" font-family="monospace" font-weight="bold">DRONE</text>
  <text x="22.5" y="30" font-size="4.5" fill="#666688" text-anchor="middle" font-family="monospace">CORE</text>
  <!-- PITCH label and knob area -->
  <text x="22.5" y="122" font-size="4" fill="#778877" text-anchor="middle" font-family="monospace">PITCH</text>
  <!-- V/OCT input label -->
  <text x="22.5" y="288" font-size="3.5" fill="#557755" text-anchor="middle" font-family="monospace">V/OCT</text>
  <!-- SINE output label -->
  <text x="22.5" y="333" font-size="3.5" fill="#557799" text-anchor="middle" font-family="monospace">SINE</text>
</svg>
